<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RottenDouban - 烂番茄豆瓣聚合评分</title>
    <meta name="description" content="聚合烂番茄与豆瓣评分，解决国内用户无法直接访问烂番茄的问题">
    <meta name="theme-color" content="#e50914">
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <div class="logo" id="logo-btn">
                <div class="logo-icon">
                    <span class="logo-rt">RT</span><span class="logo-db">豆</span>
                </div>
                <span class="logo-text">RottenDouban</span>
            </div>
            <div class="header-center">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input id="search-input" type="text" placeholder="搜索电影名称..." autocomplete="off">
                    <kbd class="search-hint">/</kbd>
                </div>
            </div>
            <div class="header-actions">
                <select id="filter-sort" class="sort-select">
                    <option value="weighted_score">加权评分</option>
                    <option value="tomatometer">烂番茄影评人</option>
                    <option value="audience_score">烂番茄观众</option>
                    <option value="douban_score">豆瓣评分</option>
                    <option value="year">年份</option>
                </select>
                <select id="filter-category" class="sort-select">
                    <option value="">全部分类</option>
                    <option value="豆瓣Top250">豆瓣 Top 250</option>
                </select>
                <select id="filter-genre" class="sort-select">
                    <option value="">全部类型</option>
                </select>
                <button id="theme-toggle" class="icon-btn" title="切换主题">
                    <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Movie Grid -->
    <main class="main-content">
        <section class="movie-grid" id="movie-grid"></section>
    </main>

    <!-- Movie Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content" id="modal-content">
            <button class="modal-close" id="modal-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="logo-rt">RT</span><span class="logo-db">豆</span> RottenDouban
            </div>
            <p class="footer-desc">聚合烂番茄与豆瓣评分 · 解决国内访问烂番茄问题</p>
            <p class="footer-copy">数据来自 Rotten Tomatoes & 豆瓣 · <a href="https://github.com" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
