name: Crawl and Deploy

on:
  schedule:
    - cron: '0 4 * * 1,4'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        id: crawl
        continue-on-error: true
        env:
          CI_ENV: true
          CRAWLER_MODE: full
          RT_MAX_MOVIES: 50
          DOUBAN_PER_MOVIE_TIMEOUT: 60
        run: |
          echo "=== Starting crawler (Algolia API + Douban API, no browser) ==="
          python run.py 2>&1 ; CRAWLER_EXIT=$?
          echo "=== Crawler exit code: $CRAWLER_EXIT ==="
          echo "=== Crawler log (last 80 lines) ==="
          if [ -f "crawler/data/crawler.log" ]; then
            tail -80 crawler/data/crawler.log
          else
            echo "No crawler.log found"
          fi
          if [ -f "crawler/data/movies.db" ]; then
            MOVIE_COUNT=$(python scripts/check_db.py)
            echo "Database: $MOVIE_COUNT movies"
            if [ "$MOVIE_COUNT" -gt "0" ]; then
              echo "crawl_result=success" >> $GITHUB_OUTPUT
            else
              echo "crawl_result=no_data" >> $GITHUB_OUTPUT
            fi
          else
            echo "crawl_result=no_data" >> $GITHUB_OUTPUT
          fi

      - name: Update site data
        if: steps.crawl.outputs.crawl_result == 'success'
        run: python scripts/update_site.py

      - name: Verify site data
        run: python scripts/verify_site.py

      - name: Save Douban cache
        if: steps.crawl.outputs.crawl_result == 'success'
        run: |
          if [ -f "crawler/data/douban_cache.json" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add crawler/data/douban_cache.json
            if git diff --cached --quiet; then
              echo "No cache changes"
            else
              git commit -m "Update Douban cache [skip ci]"
              git push
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
