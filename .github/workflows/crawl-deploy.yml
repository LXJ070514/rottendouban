name: Fetch Data and Deploy

on:
  schedule:
    - cron: '0 4 * * 1,4'  # 每周一、四 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'README.md'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch movie data
        id: fetch
        continue-on-error: true
        env:
          CRAWLER_MODE: full
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "=== Fetching data (Algolia API + Douban API, no browser) ==="
          python -m crawler.main 2>&1 || true
          echo "=== Crawler log ==="
          if [ -f "crawler/data/crawler.log" ]; then
            tail -50 crawler/data/crawler.log
          fi
          # Check result
          if [ -f "site/data/movies.json" ]; then
            COUNT=$(python -c "import json; print(len(json.load(open('site/data/movies.json'))))")
            echo "Movies: $COUNT"
            if [ "$COUNT" -gt "0" ]; then
              echo "result=success" >> $GITHUB_OUTPUT
            else
              echo "result=no_data" >> $GITHUB_OUTPUT
            fi
          else
            echo "result=no_data" >> $GITHUB_OUTPUT
          fi

      - name: Update site data from DB
        if: steps.fetch.outputs.result == 'success'
        run: python scripts/update_site.py

      - name: Verify site data
        run: |
          if [ -f "site/data/movies.json" ]; then
            echo "✅ Site data exists"
            COUNT=$(python -c "import json; print(len(json.load(open('site/data/movies.json'))))" 2>/dev/null || echo "0")
            echo "Movies count: $COUNT"
          else
            echo "⚠️ No site data, will deploy with existing static data"
          fi

      - name: Save Douban cache
        if: steps.fetch.outputs.result == 'success'
        run: |
          if [ -f "crawler/data/douban_cache.json" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f crawler/data/douban_cache.json
            if git diff --cached --quiet; then
              echo "No cache changes"
            else
              CACHE_COUNT=$(python -c "import json; print(len(json.load(open('crawler/data/douban_cache.json'))))" 2>/dev/null || echo "0")
              git commit -m "Update Douban cache: $CACHE_COUNT entries [skip ci]"
              git pull --rebase origin main || true
              git push || true
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
